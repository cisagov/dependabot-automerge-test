---
name: Dependabot merge after build success

on:
  workflow_run:
    workflows: [build]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  on-success:
    runs-on: ubuntu-latest
    if: |
        github.event.workflow_run.conclusion == 'success' &&
        (github.event.workflow_run.actor == 'dependabot[bot]'
        || github.event.workflow_run.actor == 'jsf9k')
    steps:
      - run: gh pr merge --admin --merge "$PR_URL"
  on-failure:
    runs-on: ubuntu-latest
    if: |
        github.event.workflow_run.conclusion == 'failure' &&
        (github.event.workflow_run.actor == 'dependabot[bot]'
        || github.event.workflow_run.actor == 'jsf9k')
    steps:
      - run: echo 'The triggering workflow failed'
