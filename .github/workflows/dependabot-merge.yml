---
name: Dependabot merge after build success

on:
  workflow_run:
    workflows: [build]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  diagnostics:
    name: "Diagnostics"
    uses: felddy/reusable-workflows/.github/workflows/diagnostics.yml@v2

  on-success:
    runs-on: ubuntu-latest
    if: |
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'pull_request' &&
        (github.event.workflow_run.actor.login == 'dependabot[bot]'
        || github.event.workflow_run.actor.login == 'jsf9k'
        || github.event.workflow_run.actor.login == 'yddlef')
    steps:
      - uses: actions/checkout@v4
      - run: gh pr merge --admin --merge "$PR_URL"
    env:
      PR_URL: ${{github.event.workflow_run.pull_requests[0].url}}
      GH_TOKEN: ${{github.token}}
  on-failure:
    runs-on: ubuntu-latest
    if: |
        github.event.workflow_run.conclusion == 'failure' &&
        github.event.workflow_run.event == 'pull_request' &&
        (github.event.workflow_run.actor.login == 'dependabot[bot]'
        || github.event.workflow_run.actor.login == 'jsf9k'
        || github.event.workflow_run.actor.login == 'yddlef')
    steps:
      - run: echo '::warning::The triggering workflow failed'
