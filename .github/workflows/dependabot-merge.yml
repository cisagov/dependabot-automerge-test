---
name: Dependabot merge after build success

on:
  workflow_run:
    workflows: [build]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  diagnostics:
    name: "Diagnostics"
    uses: felddy/reusable-workflows/.github/workflows/diagnostics.yml@v2

  on-success:
    runs-on: ubuntu-latest
    if: |
        github.event.workflow_run.conclusion == 'success' &&
        (github.event.workflow_run.actor == 'dependabot[bot]'
        || github.event.workflow_run.actor == 'jsf9k'
        || github.event.workflow_run.actor == 'yddlef')
    steps:
      - run: gh pr merge --admin --merge "$PR_URL"
  on-failure:
    runs-on: ubuntu-latest
    if: |
        github.event.workflow_run.conclusion == 'failure' &&
        (github.event.workflow_run.actor == 'dependabot[bot]'
        || github.event.workflow_run.actor == 'jsf9k'
        || github.event.workflow_run.actor == 'yddlef')
    steps:
      - run: echo '::warning::The triggering workflow failed'
